name: CI - 代码检查与测试

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ========== 后端检查 ==========
  backend-lint:
    name: 后端代码检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-headline-backend
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 uv
        uses: astral-sh/setup-uv@v4

      - name: 安装依赖
        run: uv sync --no-dev

      - name: 代码检查 (ruff)
        run: |
          uv pip install ruff
          uv run ruff check . --exit-zero

  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-headline-backend

    # PostgreSQL 服务容器
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass123
          POSTGRES_DB: news_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:testpass123@localhost:5432/news_app_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 uv
        uses: astral-sh/setup-uv@v4

      - name: 安装依赖
        run: uv sync

      - name: 初始化测试数据库
        run: |
          PGPASSWORD=testpass123 psql -h localhost -U postgres -d news_app_test -f database_pg.sql || true
        env:
          PGHOST: localhost
          PGPORT: "5432"

      - name: 运行测试
        run: uv run pytest tests/ -v -m "not integration" --tb=short

  # ========== 前端检查 ==========
  frontend-build:
    name: 前端构建检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: news-headline-frontend
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: news-headline-frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 构建检查
        run: npm run build
