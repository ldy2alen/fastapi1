name: CD - 构建镜像并部署

# 手动触发 或 push到main分支时运行
on:
  workflow_dispatch:  # 手动触发按钮
  push:
    branches: [main]

# 确保一次只运行一个部署
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ========== 构建并推送 Docker 镜像 ==========
  build:
    name: 构建镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # 登录 GitHub Container Registry
      - name: 登录 GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建并推送后端镜像
      - name: 构建后端镜像
        uses: docker/build-push-action@v6
        with:
          context: ./news-headline-backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      # 构建并推送前端镜像
      - name: 构建前端镜像
        uses: docker/build-push-action@v6
        with:
          context: ./news-headline-frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  # ========== 部署到服务器 ==========
  deploy:
    name: 部署到服务器
    runs-on: ubuntu-latest
    needs: build
    # 只在 push 到 main 时自动部署，workflow_dispatch 需要手动触发
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      # 通过 SSH 连接服务器部署
      - name: 部署到 ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}        # 服务器 IP
          username: ${{ secrets.SERVER_USER }}      # SSH 用户名
          key: ${{ secrets.SERVER_SSH_KEY }}        # SSH 私钥
          port: ${{ secrets.SERVER_PORT || 22 }}    # SSH 端口
          script: |
            cd ${{ secrets.DEPLOY_PATH || '~/news-app' }}

            # 拉取最新代码
            git pull origin main

            # 登录 GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取最新镜像
            docker compose pull

            # 重启服务
            docker compose up -d --remove-orphans

            # 清理旧镜像
            docker image prune -f

            echo "部署完成！"
